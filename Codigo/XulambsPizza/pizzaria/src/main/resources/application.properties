# substitua o nome da aplicação
spring.application.name=XulambsPizza

# Para mostrar em cores no console
spring.output.ansi.enabled=ALWAYS

# Hibernate ddl auto (create, create-drop, update):
# "create": derruba as tabelas e cria novas
# "create-drop": elimina o banco e recria a cada reinício (tipicamente para testes)
# "update": compara o banco com o modelo de entidades e atualiza, sem apagar valores, tabelas ou colunas antigas
spring.jpa.hibernate.ddl-auto=update

# Para mostrar as cláusulas SQL no console enquanto testamos
spring.jpa.show-sql=true

# Usando uma porta diferente para não dar conflito com outros programas no laboratório
server.port = 8080

# Configurações MariaDB
# Substitua "nomeDoBancoDeDados" pelo nome do banco que você criar. Verifique a porta do servidor (pode ser diferente de 3306)
spring.datasource.url=jdbc:mariadb://localhost:3306/XulambsPizzaria26?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

